<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
  <title>Редактирование пользователя</title>
</head>
<body>
<h2>Редактировать пользователя</h2>
<form th:method="POST" th:action="@{/updateuser}" th:object="${user}" accept-charset="UTF-8">
  <input type="hidden" th:field="*{id}"/>

  <label>Имя: </label>
  <input type="text" th:field="*{firstName}" id="firstName"/>
  <p style="color: red" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}">
    Некорректное имя
  </p>
  <br/>

  <label>Фамилия: </label>
  <input type="text" th:field="*{lastName}" id="lastName"/>
  <p style="color: red" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}">
    Некорректная фамилия
  </p>
  <br/>

  <label>Email: </label>
  <input type="text" th:field="*{email}" id="email"/>
  <p style="color: red" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">
    Некорректный email
  </p>
  <br/>

  <input type="submit" value="Обновить"/>
</form>
</body>
</html>
