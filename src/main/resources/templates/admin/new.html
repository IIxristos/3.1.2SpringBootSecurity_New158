<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Add New User</title>
    <style>
        .error-message {
            color: red;
            font-size: 0.8em;
        }
        select[multiple] {
            height: auto;
            min-height: 100px;
            width: 200px;
        }
    </style>
</head>
<body>
<div sec:authorize="isAuthenticated()">
    <form th:action="@{/logout}" method="post">
        <input type="submit" value="Logout"/>
    </form>
</div>

<h1>Add New User</h1>
<form th:action="@{/admin}" th:object="${user}" method="post">
    <!-- Поле username -->
    <div>
        <label>Username: </label>
        <input type="text" th:field="*{username}" required/>
        <span th:if="${#fields.hasErrors('username')}"
              th:errors="*{username}"
              class="error-message"></span>
    </div>

    <!-- Поле password -->
    <div>
        <label>Password: </label>
        <input type="password" th:field="*{password}" required/>
        <span th:if="${#fields.hasErrors('password')}"
              th:errors="*{password}"
              class="error-message"></span>
    </div>

    <!-- Поле firstName -->
    <div>
        <label>First Name: </label>
        <input type="text" th:field="*{firstName}" required/>
        <span th:if="${#fields.hasErrors('firstName')}"
              th:errors="*{firstName}"
              class="error-message"></span>
    </div>

    <!-- Поле lastName -->
    <div>
        <label>Last Name: </label>
        <input type="text" th:field="*{lastName}" required/>
        <span th:if="${#fields.hasErrors('lastName')}"
              th:errors="*{lastName}"
              class="error-message"></span>
    </div>

    <!-- Поле email -->
    <div>
        <label>Email: </label>
        <input type="email" th:field="*{email}" required/>
        <span th:if="${#fields.hasErrors('email')}"
              th:errors="*{email}"
              class="error-message"></span>
    </div>

    <!-- Выбор ролей -->
    <div>
        <label>Roles: </label>
        <div th:each="role : ${allRoles}">
            <input type="checkbox" name="selectedRoles" th:value="${role.name}" />
            <span th:text="${role.name}"></span>
        </div>
        <span th:if="${#fields.hasErrors('roles')}" th:errors="*{roles}" class="error-message"></span>
    </div>

    <button type="submit">Save</button>
    <a th:href="@{/admin}">Cancel</a>
</form>
</body>
</html>
