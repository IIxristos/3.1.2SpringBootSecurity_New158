<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Edit User</title>
</head>
<body>
<div sec:authorize="isAuthenticated()">
    <form th:action="@{/logout}" method="post">
        <input type="submit" value="Logout"/>
    </form>
</div>

<h1>Edit User</h1>
<form th:action="@{/admin/{id}(id=${user.id})}" th:object="${user}" th:method="post">
    <input type="hidden" name="_method" value="patch"/>
    <input type="hidden" th:field="*{id}"/>

    <div>
        <label>Username: </label>
        <input type="text" th:field="*{username}" required/>
    </div>

    <div>
        <label>Password: </label>
        <input type="password" th:field="*{password}" placeholder="Leave blank to keep current"/>
    </div>

    <div>
        <label>First Name: </label>
        <input type="text" th:field="*{firstName}" required/>
    </div>

    <div>
        <label>Last Name: </label>
        <input type="text" th:field="*{lastName}" required/>
    </div>

    <div>
        <label>Email: </label>
        <input type="email" th:field="*{email}" required/>
    </div>

    <!-- ✅ Исправленный блок ролей -->
    <div>
        <label>Roles:</label>
        <div th:each="role : ${allRoles}">
            <input type="checkbox" name="selectedRoles" th:value="${role.name}"
                   th:checked="${user.roles != null and user.roles.contains(role)}" />
            <span th:text="${role.name}"></span>
        </div>
        <span th:if="${#fields.hasErrors('roles')}" th:errors="*{roles}" class="error-message"></span>
    </div>

    <button type="submit">Update</button>
    <a th:href="@{/admin}">Cancel</a>
</form>
</body>
</html>
