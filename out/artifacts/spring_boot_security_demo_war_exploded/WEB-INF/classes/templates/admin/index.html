<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <style>
        .role-badge {
            display: inline-block;
            background: #e0e0e0;
            padding: 2px 6px;
            border-radius: 10px;
            margin-right: 5px;
            font-size: 0.8em;
        }
    </style>
</head>
<body>
<div sec:authorize="isAuthenticated()">
    <form th:action="@{/logout}" method="post">
        <input type="submit" value="Logout"/>
    </form>
</div>

<h1>Admin Panel</h1>
<p>Logged in as: <span sec:authentication="name"></span></p>
<p>Roles: <span sec:authentication="principal.authorities"></span></p>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Username</th>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Email</th>
        <th>Roles</th>
        <th>Actions</th>
    </tr>
    <tr th:each="user : ${users}">
        <td th:text="${user.id}"></td>
        <td th:text="${user.username}"></td>
        <td th:text="${user.firstName}"></td>
        <td th:text="${user.lastName}"></td>
        <td th:text="${user.email}"></td>
        <td>
            <span th:each="role : ${user.roles}" class="role-badge" th:text="${role.name}"></span>
        </td>
        <td>
            <a th:href="@{/admin/{id}/edit(id=${user.id})}">Edit</a>
            <form th:action="@{/admin/{id}(id=${user.id})}" th:method="delete">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
</table>

<a th:href="@{/admin/new}">Add new user</a>
</body>
</html>
